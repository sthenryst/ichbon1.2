<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dorost Oldřichovice</title>
    <meta name="description" content="Odkazy komunity Dorost Oldřichovice – Bible, Instagram, web." />
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%237c3aed'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E%E2%9C%9D%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a40 50%, #24243e 100%);
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle animated background orbs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            pointer-events: none;
            animation: float 8s ease-in-out infinite alternate;
        }

        body::before {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #6c63ff, transparent);
            top: -120px;
            left: -120px;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #ff6584, transparent);
            bottom: -100px;
            right: -100px;
            animation-delay: 3s;
        }

        @keyframes float {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(30px, 30px) scale(1.08);
            }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
            z-index: 1;
        }

        .header .cross-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            display: block;
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                text-shadow: 0 0 10px #a78bfa, 0 0 30px #7c3aed;
            }

            50% {
                text-shadow: 0 0 20px #c4b5fd, 0 0 60px #a855f7;
            }
        }

        .header h1 {
            font-size: clamp(1.6rem, 5vw, 2.5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, #c4b5fd, #818cf8, #fb7185);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            margin-top: 0.5rem;
            color: #a1a1aa;
            font-size: 0.95rem;
        }

        /* Cards grid */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
        }

        /* Individual card */
        .card {
            display: flex;
            align-items: center;
            gap: 1.1rem;
            padding: 1.1rem 1.4rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            text-decoration: none;
            color: #fff;
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, border-color 0.25s ease;
            cursor: pointer;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
        }

        .card:active {
            transform: translateY(-1px) scale(0.99);
        }

        /* Logo circle */
        .logo-wrap {
            flex-shrink: 0;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        .logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Bible emoji logo */
        .logo-emoji {
            font-size: 2rem;
            line-height: 1;
        }

        /* Daily verses logo – custom gradient circle */
        .logo-bible-verse {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            font-size: 1.6rem;
            line-height: 1;
        }

        /* Dorost web logo */
        .logo-dorost-web {
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            font-size: 1.6rem;
            line-height: 1;
        }

        /* Card text */
        .card-text {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-sub {
            font-size: 0.8rem;
            color: #a1a1aa;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Arrow indicator */
        .arrow {
            color: rgba(255, 255, 255, 0.35);
            font-size: 1.2rem;
            transition: transform 0.25s ease, color 0.25s ease;
        }

        .card:hover .arrow {
            color: rgba(255, 255, 255, 0.8);
            transform: translateX(4px);
        }

        /* Accent border top on each card */
        .card-verse {
            border-top: 3px solid #7c3aed;
        }

        .card-insta {
            border-top: 3px solid #e1306c;
        }

        .card-dorost {
            border-top: 3px solid #0ea5e9;
        }

        footer {
            margin-top: 3rem;
            color: #52525b;
            font-size: 0.78rem;
            text-align: center;
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>

    <header class="header">
        <span class="cross-icon">✝</span>
        <h1>Dorost Oldřichovice</h1>

    </header>

    <div class="cards">

        <!-- 1. Daily Bible Verse -->
        <a class="card card-verse" href="https://dailyverses.net/cs/nahodny-biblicky-vers-s-obrazkem" target="_blank"
            rel="noopener noreferrer">
            <div class="logo-wrap logo-bible-verse">
                <span class="logo-emoji">📖</span>
            </div>
            <div class="card-text">
                <div class="card-title">Verš dne</div>
                <div class="card-sub">Náhodný biblický verš s obrázkem</div>
            </div>
            <span class="arrow">›</span>
        </a>

        <!-- 2. Instagram -->
        <a class="card card-insta" href="https://www.instagram.com/dorostoldrichovice" target="_blank"
            rel="noopener noreferrer">
            <div class="logo-wrap">
                <img src="https://yt3.googleusercontent.com/hzRaJF5fodTfneI8UA5g8Pb1Ixs3s9C8M4RegL3XomJMsMIAvuv3NNIKtcvdlYCwIQUttyNb=s160-c-k-c0x00ffffff-no-rj"
                    alt="Dorost Oldřichovice logo" loading="lazy" />
            </div>
            <div class="card-text">
                <div class="card-title">Instagram</div>
                <div class="card-sub">@dorostoldrichovice</div>
            </div>
            <span class="arrow">›</span>
        </a>

        <!-- 3. Dorost website -->
        <a class="card card-dorost" href="https://matczykos24-commits.github.io/dorostotos/" target="_blank"
            rel="noopener noreferrer">
            <div class="logo-wrap logo-dorost-web">
                <span class="logo-emoji">✝</span>
            </div>
            <div class="card-text">
                <div class="card-title">Dorost – web</div>
                <div class="card-sub">matczykos24-commits.github.io</div>
            </div>
            <span class="arrow">›</span>
        </a>

    </div>

    <footer>
        &copy; 2026 Dorost Oldřichovice - Vše k Boží slávě
    </footer>

</body>

</html>
